# nav2_params.yaml — Nav2 Humble configuration for the farm-ng Amiga robot.
#
# Robot specs:
#   Footprint  : 1.10 m (L) × 0.93 m (W)   →  ±0.55 m fwd/back, ±0.465 m sides
#   Max speed  : 1.5 m/s linear, 1.0 rad/s angular  (hard limits in the bridge)
#   Drive type : Differential (skid-steer four-wheel)
#   Sensor     : Velodyne VLP-16 at x=1.13 m, z=0.80 m on base_link
#
# Localization: RTAB-Map publishes map→odom TF — no AMCL needed.
# Obstacle detection: /velodyne_points (PointCloud2) on both costmaps.
#
# Typical usage (via localize_nav.launch.py or slam_nav.launch.py):
#   ros2 launch vidalia_bringup localize_nav.launch.py database_path:=~/maps/field.db

# ---------------------------------------------------------------------------
# BT Navigator
# ---------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Wait for the TF tree (map→odom→base_link) before navigating
    transform_tolerance: 0.5
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

# ---------------------------------------------------------------------------
# Controller Server  (local planner + local costmap)
# ---------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5      # diff drive: lateral ≈ 0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    # Using Regulated Pure Pursuit — better than DWB for straight agricultural rows

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0    # outdoor terrain can be slow at times

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.30          # 30 cm for field work
      yaw_goal_tolerance: 0.20         # ~11 degrees

    # Regulated Pure Pursuit — superior for straight agricultural row following.
    # Maintains tighter path tracking than DWB and slows down near obstacles.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.8         # cruise speed (m/s); bridge clamps at 1.5 m/s
      lookahead_dist: 0.6             # base lookahead distance (m)
      min_lookahead_dist: 0.3         # at low speed
      max_lookahead_dist: 1.2         # at high speed
      lookahead_time: 1.5             # seconds → scales lookahead with speed
      rotate_to_heading_angular_vel: 0.5
      transform_tolerance: 0.3
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true   # slow down on tight curves
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true     # spin-in-place to align at waypoints
      allow_reversing: false
      rotate_to_heading_min_angle: 0.785  # 45° — rotate-to-heading kicks in
      max_angular_accel: 1.2
      max_robot_pose_search_dist: 10.0

# ---------------------------------------------------------------------------
# Planner Server  (global planner + global costmap)
# ---------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5             # goal tolerance for planning
      use_astar: true            # A* is more reliable than Dijkstra for fields
      allow_unknown: true        # allow planning through unmapped space

# ---------------------------------------------------------------------------
# Behavior Server  (recoveries: spin, back-up, wait)
# ---------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.2
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.3
    rotational_acc_lim: 1.2

# ---------------------------------------------------------------------------
# Waypoint Follower
# ---------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false       # continue to next waypoint on failure
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0

# ---------------------------------------------------------------------------
# Local Costmap   (10 m × 10 m rolling window around the robot)
# ---------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 10                  # meters
      height: 10
      resolution: 0.10           # 10 cm cells — good for 0.93 m wide robot
      # Amiga footprint: 1.10 m (L) × 0.93 m (W), base_link at centre
      footprint: "[[0.55, 0.465], [-0.55, 0.465], [-0.55, -0.465], [0.55, -0.465]]"
      track_unknown_space: false
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: lidar_cloud
        lidar_cloud:
          topic: /velodyne_points
          data_type: PointCloud2
          clearing: true
          marking: true
          # Heights in the sensor frame projected to world z:
          # VLP-16 is at z=0.80 m; ground returns hit ~z=0.  Obstacles
          # (weeds, posts, people) are 0.10–2.0 m above ground.
          min_obstacle_height: 0.10
          max_obstacle_height: 2.0
          obstacle_range: 5.0    # mark obstacles within 5 m
          raytrace_range: 8.0    # clear free space up to 8 m
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # Inflate 0.75 m: safely clears 0.465 m half-width + 0.285 m margin
        inflation_radius: 0.75
      always_send_full_costmap: true

# ---------------------------------------------------------------------------
# Global Costmap   (covers the full map from RTAB-Map)
# ---------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.10
      footprint: "[[0.55, 0.465], [-0.55, 0.465], [-0.55, -0.465], [0.55, -0.465]]"
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        # RTAB-Map publishes /map as a latched/transient-local OccupancyGrid
        map_subscribe_transient_local: true
        enabled: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: lidar_cloud
        lidar_cloud:
          topic: /velodyne_points
          data_type: PointCloud2
          clearing: true
          marking: true
          min_obstacle_height: 0.10
          max_obstacle_height: 2.0
          obstacle_range: 5.0
          raytrace_range: 8.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.75
      always_send_full_costmap: true

# ---------------------------------------------------------------------------
# Map Saver  (saves the RTAB-Map OccupancyGrid if needed)
# ---------------------------------------------------------------------------
map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
